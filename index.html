<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bellum</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;width:100vw;height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Rajdhani',sans-serif;user-select:none}
canvas{display:block}
.scr{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:30;pointer-events:none;opacity:0;transition:opacity .4s}
.scr.on{pointer-events:all;opacity:1}
.scr h1{font-family:'Orbitron',sans-serif;font-size:clamp(2em,5vw,4em);letter-spacing:.1em}
.scr h2{font-family:'Rajdhani',sans-serif;font-size:1.3em;color:#999;font-weight:300;letter-spacing:.4em;text-transform:uppercase;margin-top:8px}
.btn{font-family:'Orbitron',sans-serif;font-size:1em;color:#fff;background:0 0;border:2px solid var(--c,#ff3366);padding:13px 42px;cursor:pointer;letter-spacing:.2em;transition:all .3s;margin-top:20px}
.btn:hover{background:color-mix(in srgb,var(--c,#ff3366) 20%,transparent);transform:scale(1.05);box-shadow:0 0 35px color-mix(in srgb,var(--c,#ff3366) 50%,transparent)}
.ctrls{margin-top:30px;color:#555;font-size:.82em;letter-spacing:.08em;text-align:center;line-height:2}
.ctrls b{color:#ff6699}
#title{background:radial-gradient(ellipse at 50% 80%,#1a0a2e,#000 70%)}
#title h1{color:#fff;text-shadow:0 0 40px #ff3366,0 0 80px #ff3366}
#died{background:rgba(0,0,0,.88)}
#died h1{color:#ff3333;text-shadow:0 0 30px #f00}
#died .btn{--c:#ff3333}
#won{background:rgba(0,0,0,.88)}
#won h1{color:#ffcc00;text-shadow:0 0 40px #fa0}
#won .btn{--c:#ffcc00}
#bossIntro{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;opacity:0;transition:opacity .4s;pointer-events:none;z-index:20}
#bossIntro.on{opacity:1}
#bossIntro h1{font-family:'Orbitron',sans-serif;font-size:clamp(1.6em,3.5vw,2.8em);color:#fff;letter-spacing:.15em;animation:ip 1s ease-out}
#bossIntro h2{font-family:'Rajdhani',sans-serif;font-size:1.2em;color:#777;font-weight:300;letter-spacing:.3em;text-transform:uppercase;margin-top:5px}
@keyframes ip{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1)}}
#waveBnr{position:absolute;top:36%;left:50%;transform:translate(-50%,-50%);text-align:center;opacity:0;transition:opacity .3s;pointer-events:none;z-index:20}
#waveBnr.on{opacity:1}
#waveBnr h2{font-family:'Orbitron',sans-serif;font-size:1.5em;color:#ff6699;letter-spacing:.2em;text-shadow:0 0 20px #ff3366}
/* SHOP */
#shop{background:rgba(0,0,0,.92);z-index:35}
#shop h1{color:#ffcc00;text-shadow:0 0 30px #ffaa00;font-size:clamp(1.5em,3vw,2.2em);margin-bottom:5px}
#shop .coins-display{font-family:'Orbitron',sans-serif;color:#ffcc00;font-size:1.3em;margin-bottom:18px;text-shadow:0 0 12px #ffaa00}
#shop .items{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:900px;max-height:55vh;overflow-y:auto;padding:0 20px 10px;scrollbar-width:thin;scrollbar-color:#332255 #1a0d2e}
#shop .item{background:#1a0d2e;border:1px solid #332255;padding:10px 12px;border-radius:6px;width:140px;text-align:center;cursor:pointer;transition:all .3s}
#shop .item:hover{border-color:#ffcc00;box-shadow:0 0 20px #ffcc0033;transform:translateY(-2px)}
#shop .item.bought{opacity:.35;pointer-events:none}
#shop .item h3{font-family:'Orbitron',sans-serif;color:#fff;font-size:.7em;letter-spacing:.05em;margin-bottom:6px}
#shop .item p{color:#aaa;font-size:.75em;margin-bottom:8px;line-height:1.3}
#shop .item .price{font-family:'Orbitron',sans-serif;color:#ffcc00;font-size:.85em}
#shop .btn{--c:#ffcc00}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="bossIntro"><h1 id="bn"></h1><h2 id="bt"></h2></div>
<div id="waveBnr"><h2 id="wt"></h2></div>
<div id="title" class="scr on">
<h1>BELLUM</h1><h2>Arena of Legends</h2>
<button class="btn" onclick="startGame()">ENTER THE ARENA</button>
<div class="ctrls"><b>A/D</b> Move · <b>SPACE</b> Jump · <b>J</b> Attack (3-hit combo)<br><b>K</b> Heavy Slam · <b>L</b> Dash (attack after = counter!) · <b>F</b> Parry (attack after = riposte!)</div>
</div>
<div id="died" class="scr"><h1>DEFEATED</h1><button class="btn" onclick="retryBoss()">RETRY</button></div>
<div id="won" class="scr"><h1>LEGENDARY</h1><h2>Endless Boss Rush</h2><button class="btn" onclick="startGame()">PLAY AGAIN</button></div>
<div id="shop" class="scr">
<h1>SHOP</h1>
<div class="coins-display" id="shopCoins"></div>
<div class="items" id="shopItems"></div>
<button class="btn" onclick="closeShop()">CONTINUE</button>
</div>

<script>
const cv=document.getElementById('gc'),cx=cv.getContext('2d');
let W,H,GY;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;GY=H*.82}
resize();addEventListener('resize',resize);

let gState='title',frame=0,dt=1;

// ═══ MUSIC SYSTEM ═══
const menuMusic=new Audio('make_me.mp3');menuMusic.loop=true;
const battleTracks=[new Audio('Epic 1.mp3'),new Audio('Epic 2.mp3'),new Audio('Epic 3.mp3')];
for(const t of battleTracks)t.addEventListener('ended',()=>playNextBattle());
let curBattle=null,battleIdx=0,musicStarted=false;
function startMenuMusic(){if(!musicStarted)return;stopBattle();menuMusic.currentTime=0;menuMusic.volume=1;menuMusic.playbackRate=1;menuMusic.play().catch(()=>{})}
function stopMenuMusic(){menuMusic.pause();menuMusic.currentTime=0}
function startBattle(){stopMenuMusic();battleIdx=0;playBattleTrack(0)}
function playBattleTrack(idx){if(curBattle){curBattle.pause();curBattle.currentTime=0}curBattle=battleTracks[idx];curBattle.volume=1;curBattle.playbackRate=1;curBattle.play().catch(()=>{})}
function playNextBattle(){const pool=[0,1,2].filter(i=>i!==battleIdx);battleIdx=pool[Math.floor(Math.random()*pool.length)];playBattleTrack(battleIdx)}
function stopBattle(){if(curBattle){curBattle.pause();curBattle.currentTime=0;curBattle=null}}
function updMusic(){if(!musicStarted||!curBattle)return;
  if(gState==='shop'){curBattle.volume=Math.max(.1,curBattle.volume+(.6-curBattle.volume)*.05);curBattle.playbackRate=Math.max(.3,curBattle.playbackRate+(.5-curBattle.playbackRate)*.05);return}
  // tension-based volume: 1.0 base, up to 1.2
  const T=tension();const tgtVol=Math.min(1.2,1+T*.2);const tgtRate=1;
  curBattle.volume=Math.max(.1,curBattle.volume+(tgtVol-curBattle.volume)*.05);
  curBattle.playbackRate=Math.max(.5,curBattle.playbackRate+(tgtRate-curBattle.playbackRate)*.05)}
// First user interaction unlocks audio
function unlockAudio(){if(musicStarted)return;musicStarted=true;if(gState==='title')startMenuMusic();removeEventListener('click',unlockAudio);removeEventListener('keydown',unlockAudio)}
addEventListener('click',unlockAudio);addEventListener('keydown',unlockAudio);
let tutStep=0,tutTimer=0,tutDone=false;
const tutSteps=[
  {text:'MOVE with A / D',key:'a',alt:'d',dur:90},
  {text:'JUMP with SPACE',key:' ',dur:90},
  {text:'LIGHT ATTACK: press J (3-hit combo!)',key:'j',dur:120},
  {text:'HEAVY SLAM: press K (AoE!)',key:'k',dur:90},
  {text:'DASH with L (i-frames!)',key:'l',dur:90},
  {text:'PARRY with F — then attack for RIPOSTE!',key:'f',dur:120},
  {text:'DASH then ATTACK for DODGE COUNTER!',key:'l',dur:120},
  {text:'Jump + ATTACK for AIR DIVE!',key:'j',dur:100},
];
let shkI=0,shkD=0,slMo=1,slT=0,flA=0,flC='#fff';
let parts=[],slashFx=[],warns=[],spikes=[],enemies=[];
let bgDots=[],boss=null,bossIdx=0;
let waveNum=0,waveKills=0,waveCount=0,waveWait=0;
let introT=0,phase='waves';
let coins=0;

const keys={};let pKeys={},jp={};
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' ')e.preventDefault()});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});

const rng=(a,b)=>a+Math.random()*(b-a),ri=(a,b)=>Math.floor(rng(a,b+1)),lerp=(a,b,t)=>a+(b-a)*t;
function boxOv(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function shk(i,d){shkI=Math.max(shkI,i);shkD=Math.max(shkD,d)}
function fla(c,a){flC=c||'#fff';flA=Math.max(flA,a)}
function slo(d,s){slMo=s||.25;slT=d}

// ═══ SHOP ═══
const shopDefs=[
  // ─── HEALING ───
  {id:'heal1',name:'HEAL',desc:'Restore 30 HP',cost:5,use:()=>{P.hp=Math.min(P.mhp,P.hp+30)}},
  {id:'heal2',name:'BIG HEAL',desc:'Restore 60 HP',cost:10,use:()=>{P.hp=Math.min(P.mhp,P.hp+60)}},
  {id:'fullheal',name:'FULL RESTORE',desc:'Fully heal HP',cost:25,use:()=>{P.hp=P.mhp}},
  // ─── MAX HP ───
  {id:'maxhp',name:'VITALITY',desc:'+25 Max HP',cost:15,use:()=>{P.mhp+=25;P.hp+=25},once:true},
  {id:'maxhp2',name:'FORTIFY',desc:'+40 Max HP',cost:35,use:()=>{P.mhp+=40;P.hp+=40},once:true},
  {id:'maxhp3',name:'TITAN HEART',desc:'+80 Max HP',cost:60,use:()=>{P.mhp+=80;P.hp+=80},once:true},
  // ─── DAMAGE ───
  {id:'dmgup',name:'SHARPEN',desc:'+3 sword damage',cost:20,use:()=>{P.bonusDmg+=3},once:true},
  {id:'dmgup2',name:'WHETSTONE',desc:'+5 sword damage',cost:40,use:()=>{P.bonusDmg+=5},once:true},
  {id:'dmgup3',name:'DEMON EDGE',desc:'+10 sword damage',cost:75,use:()=>{P.bonusDmg+=10},once:true},
  // ─── MOVEMENT ───
  {id:'dashup',name:'SWIFT',desc:'Faster dash cooldown',cost:12,use:()=>{P.dashBonus=8},once:true},
  {id:'dashup2',name:'PHANTOM STEP',desc:'Even faster dash + longer i-frames',cost:30,use:()=>{P.dashBonus=14;P.dashIBonus=6},once:true},
  {id:'speedup',name:'WIND WALKER',desc:'+1.5 movement speed',cost:18,use:()=>{P.spd+=1.5},once:true},
  {id:'speedup2',name:'GALE FORCE',desc:'+2 movement speed',cost:35,use:()=>{P.spd+=2},once:true},
  {id:'doublejump',name:'SKYBOUND',desc:'Triple jump',cost:28,use:()=>{P.mj=3},once:true},
  // ─── PARRY ───
  {id:'parryup',name:'IRON GUARD',desc:'Longer parry window',cost:18,use:()=>{P.pw+=5},once:true},
  {id:'parryup2',name:'AEGIS',desc:'Even longer parry + faster cooldown',cost:40,use:()=>{P.pw+=6;P.parryCDBonus=6},once:true},
  {id:'parryup3',name:'PERFECT GUARD',desc:'Parry heals 8 HP instead of 3',cost:50,use:()=>{P.parryHeal=8},once:true},
  {id:'riposteup',name:'RIPOSTE MASTER',desc:'Riposte window lasts much longer',cost:35,use:()=>{P.riposteBonusFrames=40},once:true},
  // ─── COMBO ───
  {id:'comboup',name:'CHAIN LINK',desc:'Longer combo timer',cost:15,use:()=>{P.chainMax=40},once:true},
  {id:'comboup2',name:'RELENTLESS',desc:'Combo finisher hits 2x wider',cost:30,use:()=>{P.wideFinisher=true},once:true},
  {id:'combodmg',name:'FURY',desc:'Combo counter boosts damage (+2% per hit)',cost:45,use:()=>{P.comboScaling=true},once:true},
  // ─── HEAVY ATTACK ───
  {id:'heavyup',name:'POWER SLAM',desc:'Heavy attack +50% damage',cost:25,use:()=>{P.heavyBonus=.5},once:true},
  {id:'heavyup2',name:'EARTHQUAKE',desc:'Heavy slam spawns shockwave',cost:50,use:()=>{P.heavyShockwave=true},once:true},
  // ─── AERIAL ───
  {id:'airup',name:'AERIAL ACE',desc:'Air attacks deal +75% damage',cost:22,use:()=>{P.airBonus=.75},once:true},
  {id:'divebomb',name:'METEOR STRIKE',desc:'Air dive creates explosion on landing',cost:45,use:()=>{P.diveBomb=true},once:true},
  // ─── PASSIVE / UTILITY ───
  {id:'lifesteal',name:'VAMPIRIC BLADE',desc:'Heal 2 HP per hit',cost:55,use:()=>{P.lifesteal=2},once:true},
  {id:'lifesteal2',name:'BLOOD DRINKER',desc:'Heal 5 HP per hit',cost:80,use:()=>{P.lifesteal=5},once:true},
  {id:'thorns',name:'THORNS',desc:'Enemies take 8 dmg when hitting you',cost:30,use:()=>{P.thorns=8},once:true},
  {id:'thorns2',name:'RETRIBUTION',desc:'Enemies take 20 dmg when hitting you',cost:55,use:()=>{P.thorns=20},once:true},
  {id:'magnet',name:'COIN MAGNET',desc:'Coins attracted from further away',cost:10,use:()=>{P.magnetRange=160},once:true},
  {id:'lucky',name:'LUCKY CHARM',desc:'Enemies drop +1 extra coin',cost:20,use:()=>{P.bonusCoins=1},once:true},
  {id:'lucky2',name:'FORTUNE',desc:'Enemies drop +2 extra coins',cost:45,use:()=>{P.bonusCoins=2},once:true},
  {id:'shield',name:'BARRIER',desc:'Block the next hit completely',cost:35,use:()=>{P.shield=true}},
  {id:'rage',name:'BERSERKER',desc:'Deal +30% dmg when below 25% HP',cost:30,use:()=>{P.rage=true},once:true},
  {id:'secondwind',name:'SECOND WIND',desc:'Revive once with 30% HP',cost:65,use:()=>{P.secondWind=true},once:true},
  {id:'crit',name:'PRECISION',desc:'15% chance for 2x critical hits',cost:40,use:()=>{P.critChance=.15},once:true},
  {id:'crit2',name:'ASSASSIN',desc:'25% chance for 2.5x critical hits',cost:70,use:()=>{P.critChance=.25;P.critMult=2.5},once:true},
  {id:'dashatk',name:'SHADOW STRIKE',desc:'Dodge counter deals +100% damage',cost:35,use:()=>{P.dcBonus=1},once:true},
];
let boughtOnce={};

function shopPrice(base){return Math.round(base*Math.pow(1.5,bossIdx))}
function openShop(){
  gState='shop';
  const el=document.getElementById('shop');
  document.getElementById('shopCoins').textContent=coins+' COINS';
  const cont=document.getElementById('shopItems');
  cont.innerHTML='';
  for(const d of shopDefs){
    const bought=d.once&&boughtOnce[d.id];
    const price=shopPrice(d.cost);
    const div=document.createElement('div');
    div.className='item'+(bought?' bought':'');
    div.innerHTML=`<h3>${d.name}</h3><p>${d.desc}</p><div class="price">${bought?'OWNED':price+' coins'}</div>`;
    if(!bought)div.onclick=()=>{
      if(coins>=price){coins-=price;d.use();if(d.once)boughtOnce[d.id]=true;openShop();}
    };
    cont.appendChild(div);
  }
  el.classList.add('on');
}
function closeShop(){document.getElementById('shop').classList.remove('on');gState='playing';waveWait=0;advanceAfterWaves()}

// ═══ PARTICLES ═══
function emitP(x,y,c,n,spd,life,sz,o={}){
  const max=400;if(parts.length>max)parts.splice(0,parts.length-max+n);
  for(let i=0;i<n;i++){const a=o.a!=null?o.a+(Math.random()-.5)*(o.sp||6.28):Math.random()*6.28;const s=(.4+Math.random()*.6)*spd;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-(o.up||0),life:life*(.5+Math.random()*.5),ml:life,c,sz:sz*(.5+Math.random()*.8),g:o.g!=null?o.g:.15})}}
function updParts(){for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=p.g*dt;p.life-=dt;if(p.life<=0)parts.splice(i,1)}}
function drParts(){for(const p of parts){const a=Math.max(0,p.life/p.ml);const r=p.sz*a;if(r<.3)continue;cx.globalAlpha=a*.35;cx.fillStyle=p.c;cx.beginPath();cx.arc(p.x,p.y,r*2.5,0,6.28);cx.fill();cx.globalAlpha=a;cx.beginPath();cx.arc(p.x,p.y,r,0,6.28);cx.fill()}cx.globalAlpha=1}

// ═══ SLASH FX ═══
function emitSlash(x,y,dir,c,sz,wide){slashFx.push({x,y,dir,c,sz,life:10,ml:10,w:wide})}
function drSlashFx(){for(let i=slashFx.length-1;i>=0;i--){const s=slashFx[i],pr=1-s.life/s.ml,al=1-pr;cx.save();cx.translate(s.x,s.y);cx.rotate(s.dir===1?-.4+pr*.8:Math.PI+.4-pr*.8);cx.globalAlpha=al*.4;cx.strokeStyle=s.c;cx.lineWidth=s.w?10:6;const l=s.sz*(.3+pr*.7);cx.beginPath();cx.moveTo(-l*.2,-l*.5);cx.quadraticCurveTo(l*.8,0,-l*.2,l*.5);cx.stroke();cx.globalAlpha=al*.9;cx.lineWidth=s.w?5:3*(1-pr*.5);cx.beginPath();cx.moveTo(-l*.2,-l*.5);cx.quadraticCurveTo(l*.8,0,-l*.2,l*.5);cx.stroke();cx.strokeStyle='#fff';cx.lineWidth=1.5;cx.globalAlpha=al*.4;cx.beginPath();cx.moveTo(-l*.1,-l*.3);cx.quadraticCurveTo(l*.5,0,-l*.1,l*.3);cx.stroke();cx.restore();s.life-=dt;if(s.life<=0)slashFx.splice(i,1)}cx.globalAlpha=1}

// ═══ GROUND SPIKES - BLACK + PINK DEBRIS ═══
function addSpike(x,delay,h,dmg){warns.push({x,t:delay,h:h||80,dmg:dmg||12})}
function addSpikeLine(sx,dir,n,gap,delay,stag,h,dmg){for(let i=0;i<n;i++)addSpike(sx+dir*i*gap,delay+i*stag,h,dmg)}
function updSpikes(){
  for(let i=warns.length-1;i>=0;i--){
    const w=warns[i];w.t-=dt;
    if(w.t<=0){
      spikes.push({x:w.x,y:GY,th:w.h,h:0,life:55,dmg:w.dmg,hit:false});
      shk(6,8);
      // PINK/MAGENTA messy debris chunks - more variety and volume
      const colors=['#cc2277','#ff44aa','#aa1166','#dd55bb','#881155','#ff2288','#993366'];
      for(let j=0;j<16;j++){
        const c=colors[ri(0,6)];
        parts.push({x:w.x+rng(-8,8),y:GY,vx:rng(-7,7),vy:rng(-15,-5),life:rng(30,60),ml:60,c,sz:rng(2,6),g:.1});
      }
      // MESSY CURVED LINE trails (grey + pink + dark magenta)
      for(let j=0;j<10;j++){
        const c=['#888','#cc2277','#aa1166','#666','#ff44aa'][j%5];
        parts.push({x:w.x+rng(-20,20),y:GY-rng(5,40),vx:rng(-4,4),vy:rng(-11,-2),life:rng(25,50),ml:50,c,sz:rng(1,3),g:.04});
      }
      // dark purple ground dust cloud
      emitP(w.x,GY,'#442255',12,4,25,5,{a:-1.57,sp:1.8,g:.15});
      // bright flash at base
      parts.push({x:w.x,y:GY-5,vx:0,vy:0,life:6,ml:6,c:'#ff66aa',sz:20,g:0});
      warns.splice(i,1);
    }
  }
  for(let i=spikes.length-1;i>=0;i--){
    const s=spikes[i];
    if(s.h<s.th*.95)s.h=lerp(s.h,s.th,.2*dt);
    s.life-=dt;if(s.life<12)s.h*=.92;
    // continuous pink + dark particle emission while alive
    if(s.h>20&&s.life>10&&frame%3===0){
      parts.push({x:s.x+rng(-10,10),y:GY-s.h*rng(.2,.95),vx:rng(-2.5,2.5),vy:rng(-4,-1),life:rng(12,25),ml:25,c:rng(0,1)>.4?'#cc2277':'#aa1166',sz:rng(1,3),g:.03});
      // occasional larger debris chunk floating off
      if(frame%12===0)parts.push({x:s.x+rng(-6,6),y:GY-s.h*rng(.5,.8),vx:rng(-3,3),vy:rng(-5,-2),life:rng(18,35),ml:35,c:'#ff44aa',sz:rng(2,4),g:.06});
    }
    if(!s.hit&&s.h>15&&Math.abs(P.x-s.x)<16&&P.y>GY-s.h){pHit(s.dmg);s.hit=true}
    if(s.life<=0||s.h<2)spikes.splice(i,1);
  }
}
function drWarns(){
  for(const w of warns){
    const f=Math.sin(frame*.2)*.5+.5;
    cx.globalAlpha=.2+f*.3;
    // dark warning column with pink outline
    cx.fillStyle='#22001133';cx.fillRect(w.x-14,GY-w.h,28,w.h);
    cx.strokeStyle='#cc2277';cx.lineWidth=1.5;
    cx.strokeRect(w.x-14,GY-w.h,28,w.h);
    cx.font='bold 16px Orbitron';cx.textAlign='center';cx.fillStyle='#cc2277';
    cx.fillText('!',w.x,GY-w.h-10);
  }
  cx.globalAlpha=1;
}
function drSpikes(){
  for(const s of spikes){
    const a=Math.min(1,s.life/12);
    cx.globalAlpha=a;
    // GROUND CRACK beneath spike
    cx.strokeStyle='#331133';cx.lineWidth=2;
    cx.beginPath();cx.moveTo(s.x-18,s.y);cx.lineTo(s.x-25,s.y+8);cx.stroke();
    cx.beginPath();cx.moveTo(s.x+18,s.y);cx.lineTo(s.x+22,s.y+10);cx.stroke();

function isPar(){return P.par&&P.pf<P.pw}
function pGetDmg(){
  let base=14+P.bonusDmg;
  // Rage bonus when low HP
  if(P.rage&&P.hp<P.mhp*.25)base=Math.round(base*1.3);
  // Combo scaling
  if(P.comboScaling&&P.combo>0)base=Math.round(base*(1+P.combo*.02));
  let mult=1;
  // RIPOSTE: highest reward for parry timing (5x)
  if(P.at==='rip')mult=5;
  // DODGE COUNTER: reward for positioning (2x + dcBonus)
  else if(P.at==='dc')mult=2+P.dcBonus;
  // COMBO FINISHER: reward for completing chain (2.5x, main DPS tool)
  else if(P.at==='l3')mult=2.5;
  // AERIAL: mobility reward (1.5x + airBonus)
  else if(P.at==='air'||P.at==='airland')mult=1.5+P.airBonus;
  // HEAVY: AoE (1.2x + heavyBonus)
  else if(P.at==='h')mult=1.2+P.heavyBonus;
  // CHAIN 2: slight ramp (1.3x)
  else if(P.at==='l2')mult=1.3;
  let dmg=Math.round(base*mult);
  // Critical hit
  if(P.critChance>0&&Math.random()<P.critChance){dmg=Math.round(dmg*P.critMult);emitP(P.x+P.f*30,P.y-50,'#ffff00',15,6,15,4);emitP(P.x+P.f*30,P.y-50,'#fff',8,4,12,3)}
  return dmg;
}

    cx.strokeStyle='#00ddff';cx.fillStyle='#00ddff';cx.lineWidth=2.5;cx.lineCap='round';
    cx.save();cx.translate(ai.x,ai.y);cx.scale(ai.f,1);

    cx.beginPath();cx.moveTo(0,-54);cx.lineTo(0,-15);cx.stroke();
    cx.beginPath();cx.moveTo(0,-45);cx.lineTo(-18,-30);cx.stroke();
    cx.beginPath();cx.moveTo(0,-45);cx.lineTo(18,-30);cx.stroke();
    cx.beginPath();cx.moveTo(0,-15);cx.lineTo(-15,10);cx.stroke();
    cx.beginPath();cx.moveTo(0,-15);cx.lineTo(15,10);cx.stroke();
    cx.restore();
  }

    if(P.pf<P.pw){cx.globalAlpha=.3+Math.sin(P.pf*1.5)*.3;cx.strokeStyle='#00ffff';cx.lineWidth=2;cx.beginPath();cx.arc(s*.3,-s*1.5,24,0,6.28);cx.stroke();cx.globalAlpha=1}
    cx.strokeStyle=col;cx.lineWidth=3;
    cx.beginPath();cx.moveTo(0,-s*.5);cx.lineTo(-s*.5,s*.2);cx.lineTo(-s*.5,s*.8);cx.stroke();
    cx.beginPath();cx.moveTo(0,-s*.5);cx.lineTo(s*.4,s*.2);cx.lineTo(s*.5,s*.8);cx.stroke();

// ═══ COIN DROPS ═══
let coinDrops=[];
function dropCoin(x,y,n){for(let i=0;i<n;i++)coinDrops.push({x:x+rng(-25,25),y:y-rng(20,50),vy:rng(-6,-2),vx:rng(-2,2),life:180,spin:rng(0,6.28)})}
function updCoins(){for(let i=coinDrops.length-1;i>=0;i--){const c=coinDrops[i];
  c.y+=c.vy;c.x+=c.vx;c.vy+=.14;c.vx*=.97;c.spin+=.15;
  if(c.y>GY){c.y=GY;c.vy*=-.4;if(Math.abs(c.vy)<.5)c.vy=0}
  c.life-=dt;
  // magnet pull when close
  const dx=P.x-c.x,dy=(P.y-30)-c.y,dist=Math.sqrt(dx*dx+dy*dy);
  const magR=P.magnetRange||80;
  if(dist<magR){const spd=3+(magR-80)*.02;c.x+=dx/dist*spd;c.y+=dy/dist*spd}
  if(dist<25){coins++;coinDrops.splice(i,1);
    emitP(c.x,c.y,'#ffcc00',10,4,15,3);emitP(c.x,c.y,'#fff',5,3,10,2);continue}
  if(c.life<=0)coinDrops.splice(i,1)}}
function drCoins(){for(const c of coinDrops){
  const wobble=Math.abs(Math.cos(c.spin));
  cx.fillStyle='#ffcc00';
  cx.beginPath();cx.ellipse(c.x,c.y,5*wobble,5,0,0,6.28);cx.fill();
  cx.fillStyle='#ffe066';cx.beginPath();cx.ellipse(c.x-1,c.y-1,2*wobble,2,0,0,6.28);cx.fill();
  // sparkle
  if(frame%8<2){cx.fillStyle='#fff';cx.globalAlpha=.7;cx.beginPath();cx.arc(c.x+3,c.y-4,1.5,0,6.28);cx.fill();cx.globalAlpha=1}}
  }

// ═══ ENEMIES (scale x1 → x20 over boss rounds) ═══
function enemyScale(){return 1+bossIdx*3.8}
let spawnQueue=[],spawnTimer=0;
class Mob{
  constructor(x,type){this.x=x;this.y=GY;this.vx=0;this.type=type;this.f=-1;this.anim=rng(0,6);this.dead=false;this.hf=0;
    const sc=enemyScale();

      heavy:{hp:Math.round(65*sc),col:'#ff8844',sc:32,spd:1,dmg:Math.round(14+bossIdx*3)},archer:{hp:Math.round(35*sc),col:'#ffcc44',sc:24,spd:1.2,dmg:Math.round(7+bossIdx*2)}};

    this.atk=rng(60,110);this.af=-1;this.proj=[];
    this.parrying=false;this.parryT=0;this.parryCD=rng(140,240);this.stunT=0;}
  update(){if(this.dead)return;this.anim+=.07*dt;this.f=P.x<this.x?-1:1;if(this.hf>0)this.hf-=dt;
    if(this.stunT>0){this.stunT-=dt;this.vx*=.9;return}
    if(this.vx){this.x+=this.vx*dt;this.vx*=.85;if(Math.abs(this.vx)<.2)this.vx=0}
    const d=Math.abs(P.x-this.x);
    for(let i=this.proj.length-1;i>=0;i--){const p=this.proj[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=.1*dt;p.life-=dt;
      if(Math.abs(p.x-P.x)<20&&Math.abs(p.y-(P.y-40))<45){pHit(this.dmg,p.x);this.proj.splice(i,1);continue}if(p.life<=0||p.y>GY+20)this.proj.splice(i,1)}
    // PARRY stance (not archers) - telegraphed with longer windup
    this.parryCD-=dt;
    if(!this.parrying&&this.parryCD<=0&&d<160&&this.type!=='archer'){this.parrying=true;this.parryT=0;this.parryCD=rng(160,280);
      emitP(this.x,this.y-this.sc,'#ffcc00',6,3,12,2)}
    if(this.parrying){this.parryT+=dt;this.vx*=.2;if(this.parryT>25)this.parrying=false}
    if(this.af<0&&!this.parrying){if(this.type==='archer'){if(d>200)this.x+=this.f*this.spd*dt;else if(d<150)this.x-=this.f*this.spd*.5*dt}
      else{if(d>55)this.x+=this.f*this.spd*dt}this.atk-=dt;
      if(this.type==='archer'&&this.atk<=0){const a=Math.atan2(P.y-40-this.y+30,P.x-this.x);this.proj.push({x:this.x,y:this.y-40,vx:Math.cos(a)*5,vy:Math.sin(a)*5,life:70});this.atk=rng(70,110)}
      else if(this.atk<=0&&d<75){this.af=0;this.atk=rng(55,90)}else if(this.atk<=0)this.atk=20}
    else if(!this.parrying){this.af+=dt;if(this.af>8&&this.af<14&&d<65&&Math.abs(P.y-this.y)<60)pHit(this.dmg,this.x);if(this.af>24)this.af=-1}
    this.x=Math.max(30,Math.min(W-30,this.x))}
  hit(d,isHeavy){
    // ENEMY PARRY: blocks light attacks, but combo finishers (l3) and ripostes BREAK guard
    const guardBreakers=P.at==='l3'||P.at==='rip'||P.at==='dc';
    if(this.parrying&&!guardBreakers){
      // blocked — reduced knockback to player, enemy stays guarding

    if(this.parrying&&guardBreakers){
      // GUARD BREAK! massive stagger, bonus damage
      this.parrying=false;this.stunT=40;d=Math.round(d*1.5);
      shk(10,12);fla('#ffcc00',.3);slo(8,.1);
      emitP(this.x,this.y-this.sc,'#ffcc00',30,8,25,5);emitP(this.x,this.y-this.sc,'#fff',15,6,20,4);
      // shatter effect
      for(let i=0;i<10;i++){const a=rng(0,6.28);parts.push({x:this.x+Math.cos(a)*15,y:this.y-this.sc+Math.sin(a)*15,vx:Math.cos(a)*7,vy:Math.sin(a)*7-3,life:20,ml:20,c:'#ffcc00',sz:rng(2,4),g:.1})}}

    // impact ring

    // directional blood-like particles
    for(let i=0;i<5;i++)parts.push({x:hx,y:hy,vx:(P.f*3)+rng(-2,2),vy:rng(-5,-1),life:rng(12,22),ml:22,c:this.col,sz:rng(1,3),g:.15});
    if(this.hp<=0){this.dead=true;
      emitP(this.x,this.y-this.sc,this.col,55,11,45,6);emitP(this.x,this.y-this.sc,'#fff',25,8,35,5);
      emitP(this.x,this.y-this.sc*1.5,this.col+'88',25,8,40,4,{a:-1.57,sp:2.5});
      // death flash ring
      for(let i=0;i<16;i++){const a=6.28/16*i;parts.push({x:this.x+Math.cos(a)*10,y:this.y-this.sc+Math.sin(a)*10,vx:Math.cos(a)*8,vy:Math.sin(a)*8,life:15,ml:15,c:this.col,sz:3,g:0})}
      shk(5,6);fla(this.col,.12);waveKills++;dropCoin(this.x,this.y,1+Math.floor(bossIdx*.5)+(P.bonusCoins||0))}}
  draw(){if(this.dead)return;const c=this.hf>0?'#fff':this.col,s=this.sc;

      if(this.type==='fast'){cx.strokeStyle='#88ffbb';cx.lineWidth=2;cx.beginPath();cx.moveTo(s*.7,-s*(.5-aS*.3));cx.lineTo(s*1,-s*(.75-aS*.25));cx.stroke()}

    cx.strokeStyle=c;cx.lineWidth=2.5;

    cx.beginPath();cx.moveTo(0,-s*.5);cx.lineTo(s*(.3+rS*.2),s*(.15+Math.abs(rS)*.1));cx.lineTo(s*(.25+rS*.3),s*.8);cx.stroke();

      cx.globalAlpha=.5+Math.sin(frame*.3)*.3;cx.beginPath();cx.arc(this.x,this.y-this.sc*1.2,18,0,6.28);cx.stroke();
      cx.font='bold 10px Orbitron';cx.textAlign='center';cx.fillStyle='#ffcc00';cx.fillText('GUARD',this.x,this.y-this.sc*2.95);

// ═══ GENERIC STICK FIGURE ═══
function drStick(x,y,c,s,anim,f,glow,hs){
  cx.save();cx.translate(x,y);cx.scale(f,1);
  const lw=3*(s/30),h=(hs||10)*(s/30);
  cx.strokeStyle=c;cx.fillStyle=c;cx.lineWidth=lw;cx.lineCap='round';cx.lineJoin='round';
  // idle breathing
  const breath=Math.sin(frame*.04)*.8;
  // head bob
  cx.beginPath();cx.arc(0,-s*2.2+breath*.5,h,0,6.28);cx.fill();
  // body with slight lean
  const lean=Math.sin(anim*.5)*.02*s;
  cx.beginPath();cx.moveTo(lean,-s*1.8+breath*.3);cx.lineTo(0,-s*.5);cx.stroke();
  // WALKING LEGS: proper step animation with knee bend
  const walkCycle=anim*1.2;
  const lStep=Math.sin(walkCycle), rStep=Math.sin(walkCycle+3.14);
  const lKnee=Math.abs(lStep)*.3, rKnee=Math.abs(rStep)*.3;
  // left leg: hip -> knee -> foot
  const lhx=s*-.2, lhy=-s*.5;
  const lkx=s*(-.35+lStep*.15), lky=s*(.1+lKnee*.15);
  const lfx=s*(-.3+lStep*.35), lfy=s*.8;
  cx.beginPath();cx.moveTo(lhx,lhy);cx.lineTo(lkx,lky);cx.lineTo(lfx,lfy);cx.stroke();
  // right leg
  const rhx=s*.2, rhy=-s*.5;
  const rkx=s*(.35+rStep*.15), rky=s*(.1+rKnee*.15);
  const rfx=s*(.3+rStep*.35), rfy=s*.8;
  cx.beginPath();cx.moveTo(rhx,rhy);cx.lineTo(rkx,rky);cx.lineTo(rfx,rfy);cx.stroke();
  // ARMS: swing opposite to legs
  const aSwL=Math.sin(walkCycle+1.57)*.35, aSwR=Math.sin(walkCycle-1.57)*.35;
  // left arm: shoulder -> elbow -> hand
  cx.beginPath();cx.moveTo(lean,-s*1.5+breath*.3);cx.lineTo(-s*.5,-s*(1.1+aSwL*.3));cx.lineTo(-s*.8,-s*(.6+aSwL*.5));cx.stroke();
  // right arm
  cx.beginPath();cx.moveTo(lean,-s*1.5+breath*.3);cx.lineTo(s*.5,-s*(1.1+aSwR*.3));cx.lineTo(s*.8,-s*(.6+aSwR*.5));cx.stroke();
  cx.restore();
}

// ═══ BOSS BASE (attack cooldowns MUCH slower) ═══
class BossBase{
  constructor(o){Object.assign(this,{name:o.name,title:o.title,col:o.col,x:o.x||W*.72,y:GY,
    hp:Math.round(o.hp*bossHPScale()),mhp:Math.round(o.hp*bossHPScale()),sc:o.sc||40,f:-1,anim:0,hf:0,st:'idle',stt:0,atkT:o.atkT||120,
    ph:0,dead:false,proj:[],hs:o.hs||10})}
  fP(){this.f=P.x<this.x?-1:1}
  dTP(){return Math.abs(P.x-this.x)}
  onParried(){this.stt=0;this.st='idle';this.atkT=Math.max(this.atkT,40)}
  takeDamage(d){this.hp-=d;this.hf=10;
    const hx=this.x-(this.x-P.x)*.2,hy=this.y-this.sc*1.2;
    emitP(hx,hy,this.col,20,7,25,5);
    emitP(hx,hy,'#fff',12,5,18,4);
    emitSlash(hx,hy,P.f,'#fff',60);
    // impact ring
    parts.push({x:hx,y:hy,vx:0,vy:0,life:8,ml:8,c:'#fff',sz:18,g:0});
    // sparks flying off
    for(let i=0;i<6;i++)parts.push({x:hx,y:hy,vx:P.f*rng(2,6)+rng(-2,2),vy:rng(-6,-1),life:rng(10,20),ml:20,c:'#fff',sz:rng(1,3),g:.12});
    shk(5,6);if(this.hp<=0){this.hp=0;this.die()}}
  die(){this.dead=true;
    emitP(this.x,this.y-this.sc,this.col,120,14,80,7);
    emitP(this.x,this.y-this.sc,'#fff',60,10,60,5);
    emitP(this.x,this.y-this.sc*2,this.col,40,8,50,4,{a:-1.57,sp:2});
    for(let i=0;i<20;i++){parts.push({x:this.x+rng(-30,30),y:this.y-this.sc+rng(-40,20),vx:rng(-8,8),vy:rng(-14,-4),life:rng(40,80),ml:80,c:i%2?this.col:'#fff',sz:rng(3,7),g:.15})}
    emitP(this.x,this.y,'#fff',30,10,30,4,{a:-1.57,sp:2.5,g:.25});
    shk(22,28);slo(50,.15);fla(this.col,.7);
    dropCoin(this.x,this.y,5+bossIdx*2+loopCount*3+(P.bonusCoins||0)*2);
    setTimeout(()=>{bossIdx++;
      if(bossIdx>=bossPool.length){
        // ENDLESS: completed a full loop, randomize order, scale up
        loopCount++;bossIdx=0;
        // Shuffle boss order for next loop
        for(let i=bossPool.length-1;i>0;i--){const j=ri(0,i);[bossPool[i],bossPool[j]]=[bossPool[j],bossPool[i]]}
      }
      startBossPhase()},2200)}
  updProj(){for(let i=this.proj.length-1;i>=0;i--){const p=this.proj[i];p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.g)p.vy+=p.g*dt;p.life-=dt;
    if(Math.abs(p.x-P.x)<22&&Math.abs(p.y-(P.y-40))<48){pHit(p.dmg||10,p.x);this.proj.splice(i,1);continue}if(p.life<=0||p.x<-50||p.x>W+50||p.y>H+50)this.proj.splice(i,1)}}
  drProj(){for(const p of this.proj){const pc=p.c||this.col;cx.fillStyle=pc;
    cx.beginPath();cx.arc(p.x,p.y,p.sz||6,0,6.28);cx.fill();
    // particle trail
    cx.globalAlpha=.4;cx.beginPath();cx.arc(p.x-p.vx*2,p.y-p.vy*2,(p.sz||6)*.7,0,6.28);cx.fill();
    cx.globalAlpha=.2;cx.beginPath();cx.arc(p.x-p.vx*4,p.y-p.vy*4,(p.sz||6)*.4,0,6.28);cx.fill();
    cx.globalAlpha=1}}
  drHP(){const bw=300,bh=8,bx=W/2-bw/2,by=H-50;cx.fillStyle='#1a0a2e';cx.fillRect(bx-2,by-2,bw+4,bh+4);
    const r=Math.max(0,this.hp/this.mhp),g=cx.createLinearGradient(bx,0,bx+bw*r,0);g.addColorStop(0,this.col);g.addColorStop(1,'#fff');
    cx.fillStyle=g;cx.fillRect(bx,by,bw*r,bh);cx.strokeStyle=this.col+'88';cx.lineWidth=1;cx.strokeRect(bx-2,by-2,bw+4,bh+4);
    cx.fillStyle=this.col;cx.font='700 14px Orbitron';cx.textAlign='center';cx.fillText(this.name,W/2,by-10)}
  box(){return{x:this.x-this.sc*.6,y:this.y-this.sc*2.5,w:this.sc*1.2,h:this.sc*2.8}}
}

function checkHits(){const ab=pAtkBox();if(!ab)return;
  const dmg=pGetDmg();const isH=P.at==='h'||P.at==='l3'||P.at==='dc'||P.at==='rip';
  let hitSomething=false;
  for(const e of enemies){if(!e.dead&&boxOv(ab,e.box())){e.hit(dmg,isH);if(isH)shk(5,6);hitSomething=true}}
  if(boss&&!boss.dead){
    if(boss instanceof Twins){const b1={x:boss.x-25,y:boss.y-80,w:50,h:80},b2={x:boss.twin.x-25,y:boss.twin.y-80,w:50,h:80};
      if(boxOv(ab,b1)||boxOv(ab,b2)){boss.takeDamage(dmg);if(isH)shk(5,6);hitSomething=true}}
    else if(boxOv(ab,boss.box())){boss.takeDamage(dmg);if(isH)shk(5,6);hitSomething=true}}
  if(hitSomething&&isH)slo(3,.4);
  // Lifesteal
  if(hitSomething&&P.lifesteal>0){P.hp=Math.min(P.mhp,P.hp+P.lifesteal);emitP(P.x,P.y-50,'#44ff44',4,2,10,2)}
  // Heavy shockwave on hit
  if(hitSomething&&P.at==='h'&&P.heavyShockwave){
    for(const e of enemies){if(!e.dead&&Math.abs(e.x-P.x)<200){e.hit(Math.round(dmg*.4),false);emitP(e.x,e.y-e.sc,'#fff',6,3,10,2)}}
    emitP(P.x,P.y,'#ffffff',20,8,20,4,{a:0,sp:6.28});shk(8,10)}
  // Dive bomb explosion on air land
  if(hitSomething&&P.at==='airland'&&P.diveBomb){
    emitP(P.x,P.y,'#ff6600',40,10,30,5);emitP(P.x,P.y,'#ffcc00',20,8,25,4);shk(12,14);
    for(const e of enemies){if(!e.dead&&Math.abs(e.x-P.x)<180){e.hit(Math.round(dmg*.6),false)}}
    if(boss&&!boss.dead&&Math.abs(boss.x-P.x)<180)boss.takeDamage(Math.round(dmg*.6))}
}

// ═══ MAIN LOOP ═══
function loop(){
  requestAnimationFrame(loop);frame++;
  jp={};for(const k in keys){if(keys[k]&&!pKeys[k])jp[k]=true}pKeys={...keys};
  updMusic();
  if(gState==='shop'){cx.save();drBg();updParts();drParts();cx.restore();return}

  dt=1;if(slT>0){dt=slMo;slT--;if(slT<=0)slMo=1}
  let sx=0,sy=0;if(shkD>0){sx=(Math.random()-.5)*shkI*2;sy=(Math.random()-.5)*shkI*2;shkD-=dt;if(shkD<=0)shkI=0}

  cx.save();cx.translate(sx,sy);drBg();

  if(gState==='intro'){introT-=dt;if(boss)boss.draw();drP();if(introT<=0){gState='playing';document.getElementById('bossIntro').classList.remove('on')}}

  if(gState==='playing'||gState==='death'){
    if(gState==='playing'){updP();updCoins()}
    updSpawnQueue();for(const e of enemies)if(!e.dead)e.update();
    if(gState==='playing')checkHits();
    if(boss&&!boss.dead)boss.update();
    if(phase==='boss'&&vm1Ref&&vm1Ref.dead&&!trn.on&&phase!=='transition'&&phase!=='bossP2'){phase='transition';startTrn(vm1Ref.x)}
    if(trn.on)updTrn();
    // wave done -> SHOP
    if(phase==='prewaves'&&waveNum>0&&waveKills>=waveCount){waveWait+=dt;if(waveWait>50){waveWait=0;openShop()}}
    updSpikes();updBossWarns();
    for(const e of enemies)if(!e.dead)e.draw();
    drCoins();
    if(boss&&!boss.dead){boss.draw();
      // BOSS AURA: ambient particles
      if(frame%4===0){const ba=rng(0,6.28),br=rng(20,boss.sc*1.5);
        parts.push({x:boss.x+Math.cos(ba)*br,y:boss.y-boss.sc+Math.sin(ba)*br*.6,vx:Math.cos(ba)*.5,vy:Math.sin(ba)*.3-.5,life:rng(15,30),ml:30,c:boss.col+'66',sz:rng(1.5,3),g:-.02})}
      // low HP rage particles
      if(boss.hp<boss.mhp*.25&&frame%2===0)parts.push({x:boss.x+rng(-30,30),y:boss.y-rng(10,boss.sc*2),vx:rng(-1,1),vy:rng(-3,-1),life:rng(10,20),ml:20,c:boss.col,sz:rng(2,4),g:-.05})}
    drTrn();drBossWarns();drWarns();drSpikes();drP();drHUD();
    // TUTORIAL overlay
    if(!tutDone&&bossIdx===0&&loopCount===0&&phase==='prewaves'){
      tutTimer+=dt;
      if(tutStep<tutSteps.length){
        const ts=tutSteps[tutStep];
        // draw tutorial text
        cx.fillStyle='#fff';cx.font='700 18px Orbitron';cx.textAlign='center';
        cx.fillText(ts.text,W/2,H*.25);
        // progress bar
        const prog=Math.min(1,tutTimer/ts.dur);
        cx.fillStyle='#00ddff33';cx.fillRect(W/2-100,H*.25+15,200,4);
        cx.fillStyle='#00ddff';cx.fillRect(W/2-100,H*.25+15,200*prog,4);
        // advance on key press or timeout
        if(jp[ts.key]||jp[ts.alt||'']||tutTimer>ts.dur){tutStep++;tutTimer=0}
      } else {tutDone=true}
    }
  }
  updParts();drParts();drSlashFx();
  // color flash
  if(flA>0){cx.fillStyle=flC;cx.globalAlpha=Math.max(0,flA);cx.fillRect(0,0,W,H);cx.globalAlpha=1;flA-=.025*dt}
  // heavy vignette
  const vg=cx.createRadialGradient(W/2,H/2,W*.25,W/2,H/2,W*.75);
  vg.addColorStop(0,'transparent');vg.addColorStop(.7,'rgba(0,0,0,.25)');vg.addColorStop(1,'rgba(0,0,0,.7)');
  cx.fillStyle=vg;cx.fillRect(0,0,W,H);
  // LOW HP DANGER: red pulse vignette + heartbeat shake
  if(P.hp>0&&P.hp<P.mhp*.25&&gState==='playing'){
    const pulse=Math.sin(frame*.08)*.5+.5;
    const dv=cx.createRadialGradient(W/2,H/2,W*.2,W/2,H/2,W*.6);
    dv.addColorStop(0,'transparent');dv.addColorStop(1,`rgba(180,0,0,${pulse*.2})`);
    cx.fillStyle=dv;cx.fillRect(0,0,W,H);
    // subtle heartbeat shake
    if(Math.floor(frame*.08/(Math.PI*2)*60)%60<3)shk(1.5,2);
  }
  // tension pulse overlay
  const T2=tension();
  if(T2>.2){
    const tPulse=Math.sin(frame*.06)*.5+.5;
    cx.globalAlpha=T2*.04*tPulse;cx.fillStyle='#ff2244';cx.fillRect(0,0,W,H);cx.globalAlpha=1;
  }
  // scanline overlay (more visible during boss)
  const scanA=.02+T2*.02;
  cx.fillStyle=`rgba(0,0,0,${scanA})`;
  for(let y=0;y<H;y+=3)cx.fillRect(0,y,W,1);
  // chromatic edges during high tension
  if(T2>.6){cx.globalAlpha=T2*.03;cx.fillStyle='#ff0000';cx.fillRect(0,0,3,H);cx.fillRect(W-3,0,3,H);
    cx.fillStyle='#0000ff';cx.fillRect(0,0,W,2);cx.fillRect(0,H-2,W,2);cx.globalAlpha=1}
  cx.restore();
}
initBg();loop();
</script>
